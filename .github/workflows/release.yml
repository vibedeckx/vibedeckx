name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package and prepare platform artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="vibedeckx-${VERSION}-${{ matrix.platform }}"
          CURRENT_PLATFORM="${{ matrix.platform }}"
          mkdir -p "staging/${ARCHIVE_NAME}"

          # Copy dist (esbuild bundle + bundled UI)
          cp -r packages/vibedeckx/dist "staging/${ARCHIVE_NAME}/"

          # Copy platform package.json (has native module dependencies)
          cp "packages/vibedeckx-${{ matrix.platform }}/package.json" "staging/${ARCHIVE_NAME}/"

          # Install native module dependencies and rebuild for target platform
          cd "staging/${ARCHIVE_NAME}"
          npm install --ignore-scripts --legacy-peer-deps
          npm rebuild better-sqlite3 node-pty

          # Patch native module package.json: remove scripts/gypfile, set files to runtime-only
          # npm pack and npm publish (via bundleDependencies) respect each package's files field
          node -e "
            const fs = require('fs');
            const platform = '${CURRENT_PLATFORM}';

            const pty = JSON.parse(fs.readFileSync('node_modules/node-pty/package.json', 'utf8'));
            delete pty.scripts;
            delete pty.gypfile;
            delete pty.dependencies;
            pty.files = ['lib/', 'prebuilds/' + platform + '/'];
            fs.writeFileSync('node_modules/node-pty/package.json', JSON.stringify(pty, null, 2) + '\n');

            const bs3 = JSON.parse(fs.readFileSync('node_modules/better-sqlite3/package.json', 'utf8'));
            delete bs3.scripts;
            delete bs3.gypfile;
            bs3.dependencies = { bindings: '*' };
            bs3.files = ['lib/', 'build/Release/better_sqlite3.node'];
            fs.writeFileSync('node_modules/better-sqlite3/package.json', JSON.stringify(bs3, null, 2) + '\n');
          "

          # Ensure spawn-helper is executable (macOS)
          find node_modules/node-pty -name "spawn-helper" -exec chmod +x {} \; 2>/dev/null || true

          # --- Archive: inject bin for npx, create via npm pack ---
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'vibedeckx';
            pkg.version = '${VERSION}';
            pkg.bin = { vibedeckx: './dist/bin.js' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm pack --pack-destination ../../
          mv "../../vibedeckx-${VERSION}.tgz" "../../${ARCHIVE_NAME}.tar.gz"

          # --- npm package: use platform template (scoped name, no bin) ---
          cd ../..
          mkdir -p npm-package
          cp -r "staging/${ARCHIVE_NAME}/dist" npm-package/
          rm -f npm-package/dist/bin.js.map
          cp -r "staging/${ARCHIVE_NAME}/node_modules" npm-package/
          cp "packages/vibedeckx-${{ matrix.platform }}/package.json" npm-package/
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm-package/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('npm-package/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        shell: bash

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibedeckx-${{ matrix.platform }}
          path: "*.tar.gz"

      - name: Upload npm platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: npm-package/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vibedeckx-*
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md << NOTES_EOF
          ## Installation

          ### Quick install via npx

          \`\`\`bash
          npx vibedeckx@latest
          \`\`\`

          ### macOS

          1. Download \`vibedeckx-${VERSION}-darwin-arm64.tar.gz\`
          2. Install globally via npm:
          \`\`\`bash
          npm install -g ./vibedeckx-${VERSION}-darwin-arm64.tar.gz
          \`\`\`
          3. Run:
          \`\`\`bash
          vibedeckx
          \`\`\`

          ### Linux

          1. Download \`vibedeckx-${VERSION}-linux-x64.tar.gz\`
          2. Run directly with npx:
          \`\`\`bash
          npx -y ./vibedeckx-${VERSION}-linux-x64.tar.gz
          \`\`\`

          ### Windows

          1. Download \`vibedeckx-${VERSION}-win32-x64.tar.gz\`
          2. Run directly with npx:
          \`\`\`bash
          npx -y ./vibedeckx-${VERSION}-win32-x64.tar.gz
          \`\`\`

          ### Platform archives
          | Platform | File |
          |----------|------|
          NOTES_EOF

          for f in artifacts/*; do
            fname=$(basename "$f")
            echo "| $(echo $fname | sed 's/vibedeckx-[0-9.]*-//' | sed 's/\.tar\.gz//') | \`${fname}\` |" >> release-notes.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/*
          generate_release_notes: true
          append_body: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download platform npm packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-packages

      # Publish each platform package
      - name: Publish @vibedeckx/linux-x64
        run: npm publish --access public
        working-directory: npm-packages/npm-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibedeckx/darwin-arm64
        run: npm publish --access public
        working-directory: npm-packages/npm-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibedeckx/win32-x64
        run: npm publish --access public
        working-directory: npm-packages/npm-win32-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main thin wrapper package
      - name: Prepare main package for npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd packages/vibedeckx

          # Rewrite package.json as thin wrapper (no dependencies, just platform optionalDeps)
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const wrapper = {
              name: pkg.name,
              version: '${VERSION}',
              type: 'module',
              description: 'AI-powered app generator with project management',
              bin: { vibedeckx: './bin/vibedeckx.mjs' },
              files: ['bin'],
              engines: { node: '>=20' },
              optionalDependencies: {
                '@vibedeckx/linux-x64': '${VERSION}',
                '@vibedeckx/darwin-arm64': '${VERSION}',
                '@vibedeckx/win32-x64': '${VERSION}'
              }
            };
            require('fs').writeFileSync('package.json', JSON.stringify(wrapper, null, 2) + '\n');
          "

      - name: Publish vibedeckx
        run: npm publish --access public
        working-directory: packages/vibedeckx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
