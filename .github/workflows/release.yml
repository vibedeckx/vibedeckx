name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package and prepare platform artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version tag: $VERSION" >&2
            exit 1
          fi
          ARCHIVE_NAME="vibedeckx-${VERSION}-${{ matrix.platform }}"
          CURRENT_PLATFORM="${{ matrix.platform }}"
          mkdir -p "staging/${ARCHIVE_NAME}"

          # Copy dist (esbuild bundle + bundled UI)
          cp -r packages/vibedeckx/dist "staging/${ARCHIVE_NAME}/"

          # Copy platform package.json (has native module dependencies)
          cp "packages/vibedeckx-${{ matrix.platform }}/package.json" "staging/${ARCHIVE_NAME}/"

          # Install native module dependencies and rebuild for target platform
          cd "staging/${ARCHIVE_NAME}"
          npm install --ignore-scripts --legacy-peer-deps
          # node-pty ships its own multi-ABI prebuilds/ dir
          npm rebuild node-pty

          # Bundle better-sqlite3 prebuilts for every supported Node ABI and
          # patch its loader to select at runtime. Replaces `npm rebuild
          # better-sqlite3`, which produced a single binary locked to the
          # build host's Node ABI (breaking users on other Node versions).
          GITHUB_TOKEN="${{ github.token }}" \
            "$GITHUB_WORKSPACE/scripts/bundle-bs3-prebuilds.sh" node_modules/better-sqlite3 "$CURRENT_PLATFORM"

          # Patch node-pty package.json: remove scripts/gypfile, set files to runtime-only.
          # npm pack and npm publish (via bundleDependencies) respect each package's files field.
          # better-sqlite3's package.json is rewritten by the bundle script above.
          node -e "
            const fs = require('fs');
            const platform = '${CURRENT_PLATFORM}';

            const pty = JSON.parse(fs.readFileSync('node_modules/node-pty/package.json', 'utf8'));
            delete pty.scripts;
            delete pty.gypfile;
            delete pty.dependencies;
            pty.files = ['lib/', 'prebuilds/' + platform + '/'];
            fs.writeFileSync('node_modules/node-pty/package.json', JSON.stringify(pty, null, 2) + '\n');
          "

          # Ensure spawn-helper is executable (macOS)
          find node_modules/node-pty -name "spawn-helper" -exec chmod +x {} \; 2>/dev/null || true

          # Guard: fail the build if a native module was compiled from source
          # against a too-new glibc instead of using an official prebuilt.
          "$GITHUB_WORKSPACE/scripts/check-glibc.sh" node_modules

          # --- Archive: inject bin for npx, include sourcemap, create via npm pack ---
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'vibedeckx';
            pkg.version = process.env.VERSION;
            pkg.bin = { vibedeckx: './dist/bin.js' };
            pkg.files = ['dist', 'node_modules'];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm pack --pack-destination ../../
          mv "../../vibedeckx-${VERSION}.tgz" "../../${ARCHIVE_NAME}.tar.gz"

          # --- npm package: use platform template (scoped name, no bin) ---
          # dist/ui is stripped: the npm install path (remote workers) gets the
          # lean package; the server downloads @vibedeckx/ui-dist at runtime.
          # The platform archive above keeps dist/ui baked in (Docker / npx).
          cd ../..
          mkdir -p npm-package
          cp -r "staging/${ARCHIVE_NAME}/dist" npm-package/
          rm -f npm-package/dist/bin.js.map
          rm -rf npm-package/dist/ui
          cp -r "staging/${ARCHIVE_NAME}/node_modules" npm-package/
          cp "packages/vibedeckx-${{ matrix.platform }}/package.json" npm-package/
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm-package/package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            pkg.files = (pkg.files || []).filter((f) => f !== 'dist/ui');
            fs.writeFileSync('npm-package/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        shell: bash

      - name: Prepare UI npm package (@vibedeckx/ui-dist)
        if: matrix.platform == 'linux-x64'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version tag: $VERSION" >&2
            exit 1
          fi
          mkdir -p npm-ui-dist
          cp packages/vibedeckx-ui-dist/package.json npm-ui-dist/
          cp -r apps/vibedeckx-ui/out npm-ui-dist/ui
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm-ui-dist/package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('npm-ui-dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        shell: bash

      - name: Upload npm UI package
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: npm-ui-dist
          path: npm-ui-dist/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibedeckx-${{ matrix.platform }}
          path: "*.tar.gz"

      - name: Upload npm platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: npm-package/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vibedeckx-*
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md << NOTES_EOF
          ## Installation

          ### Quick install via npx

          \`\`\`bash
          npx vibedeckx@latest
          \`\`\`

          ### macOS

          1. Download \`vibedeckx-${VERSION}-darwin-arm64.tar.gz\`
          2. Install globally via npm:
          \`\`\`bash
          npm install -g ./vibedeckx-${VERSION}-darwin-arm64.tar.gz
          \`\`\`
          3. Run:
          \`\`\`bash
          vibedeckx
          \`\`\`

          ### Linux

          1. Download \`vibedeckx-${VERSION}-linux-x64.tar.gz\`
          2. Run directly with npx:
          \`\`\`bash
          npx -y ./vibedeckx-${VERSION}-linux-x64.tar.gz
          \`\`\`

          ### Windows

          1. Download \`vibedeckx-${VERSION}-win32-x64.tar.gz\`
          2. Run directly with npx:
          \`\`\`bash
          npx -y ./vibedeckx-${VERSION}-win32-x64.tar.gz
          \`\`\`

          ### Platform archives
          | Platform | File |
          |----------|------|
          NOTES_EOF

          for f in artifacts/*; do
            fname=$(basename "$f")
            echo "| $(echo $fname | sed 's/vibedeckx-[0-9.]*-//' | sed 's/\.tar\.gz//') | \`${fname}\` |" >> release-notes.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: artifacts/*
          generate_release_notes: true
          append_body: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download platform npm packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-packages

      # Publish the UI package first: the platform packages' runtime download
      # expects @vibedeckx/ui-dist@<version> to exist once they are installable.
      - name: Publish @vibedeckx/ui-dist
        run: npm publish --access public
        working-directory: npm-packages/npm-ui-dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish each platform package
      - name: Publish @vibedeckx/linux-x64
        run: npm publish --access public
        working-directory: npm-packages/npm-linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibedeckx/darwin-arm64
        run: npm publish --access public
        working-directory: npm-packages/npm-darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibedeckx/win32-x64
        run: npm publish --access public
        working-directory: npm-packages/npm-win32-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main thin wrapper package
      - name: Prepare main package for npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version tag: $VERSION" >&2
            exit 1
          fi
          cd packages/vibedeckx

          # Rewrite package.json as thin wrapper (no dependencies, just platform optionalDeps)
          VERSION="$VERSION" node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const version = process.env.VERSION;
            const wrapper = {
              name: pkg.name,
              version,
              type: 'module',
              description: 'AI-powered app generator with project management',
              bin: { vibedeckx: './bin/vibedeckx.mjs' },
              files: ['bin'],
              engines: { node: '>=22' },
              optionalDependencies: {
                '@vibedeckx/linux-x64': version,
                '@vibedeckx/darwin-arm64': version,
                '@vibedeckx/win32-x64': version
              }
            };
            require('fs').writeFileSync('package.json', JSON.stringify(wrapper, null, 2) + '\n');
          "

      - name: Publish vibedeckx
        run: npm publish --access public
        working-directory: packages/vibedeckx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
